services:
  accounts:
    image: "ahmed7ismail/accounts:d2"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - ahmed7ismail
  loans:
    image: "ahmed7ismail/loans:d2"
    container_name: loans-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - ahmed7ismail
  cards:
    image: "ahmed7ismail/cards:d2"
    container_name: cards-ms
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - ahmed7ismail
networks:
  ahmed7ismail:
    driver: "bridge"